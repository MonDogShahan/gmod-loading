<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>讀取畫面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            overflow: hidden;
            font-family: "微軟正黑體", sans-serif;
            
            /* 新增：讓背景圖片切換時有 1.5 秒的平滑淡入淡出效果 */
            transition: background-image 1.5s ease-in-out;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo {
            max-width: 400px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.8));
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .loading-box {
            background: rgba(20, 20, 40, 0.85);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            text-align: center;
            width: 60%;
            max-width: 800px;
        }

        .server-title {
            color: #fff;
            font-size: 2.5em;
            font-weight: bold;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px #ff69b4;
        }

        .status-text {
            color: #00ffcc;
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        /* 檔案下載進度條 */
        .progress-container {
            width: 100%;
            background-color: #222;
            border-radius: 10px;
            border: 1px solid #555;
            overflow: hidden;
            height: 25px;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff69b4, #ff1493);
            transition: width 0.2s;
            box-shadow: 0 0 15px #ff69b4;
        }

        /* 當前下載檔案名稱 */
        .file-name {
            color: #aaa;
            font-size: 1.1em;
            height: 25px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <img src="logo.png" alt="Server Logo" class="logo" onerror="this.style.display='none'">
        
        <div class="loading-box">
            <h1 class="server-title">⚡ Hanahime 伺服器 ⚡</h1>
            <div class="status-text" id="status-text">正在連接伺服器...</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="file-name" id="file-name">準備載入遊戲資源...</div>
        </div>
    </div>

    <script>
        // === 背景圖片輪播設定 ===
        const backgrounds = [
            'bg2.png', 'bg3.png', 'bg4.png', 'bg5.png'
        ];
        
        // 1. 預先載入所有圖片，防止切換時出現短暫黑畫面
        backgrounds.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        let currentBgIndex = -1;

        // 2. 隨機切換背景的函數 (防呆：確保不會連續抽到同一張圖)
        function changeBackground() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * backgrounds.length);
            } while (newIndex === currentBgIndex && backgrounds.length > 1);
            
            currentBgIndex = newIndex;
            document.body.style.backgroundImage = `url('${backgrounds[currentBgIndex]}')`;
        }

        // 3. 初始載入第一張
        changeBackground();

        // 4. 每隔 6 秒 (6000 毫秒) 自動執行一次切換
        setInterval(changeBackground, 6000);


        // === GMod 讀取畫面專用函數 ===
        
        // 更新總進度與狀態文字
        function SetStatusChanged(status) {
            document.getElementById('status-text').innerText = status;
        }

        // 正在下載的檔案名稱
        function DownloadingFile(fileName) {
            document.getElementById('file-name').innerText = "正在下載: " + fileName;
        }

        // 更新進度條 (GMod 傳入的是下載的檔案數量與總數)
        function SetFilesNeeded(needed) {
            // 需要下載的總數
            window.totalFiles = needed;
        }

        function SetFilesTotal(total) {
            if(window.totalFiles > 0) {
                let downloaded = window.totalFiles - total;
                let percent = (downloaded / window.totalFiles) * 100;
                document.getElementById('progress-bar').style.width = percent + "%";
            }
        }
    </script>
</body>
</html>
