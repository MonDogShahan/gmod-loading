<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanahimeのゲーセン</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #111;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: "微軟正黑體", "Microsoft JhengHei", Arial, sans-serif;
            overflow: hidden; color: white;
            
            /* 背景圖片切換時的平滑淡入淡出效果 */
            transition: background-image 1.5s ease-in-out;
        }

        .overlay {
            width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0) 100%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 50px 80px; box-sizing: border-box;
        }

        /* 標題陰影改為粉紅色 */
        h1 { font-size: 3.5em; margin: 0 0 5px 0; text-shadow: 0 0 15px #ff69b4, 2px 2px 5px rgba(0,0,0,0.9); letter-spacing: 2px; }
        h2 { font-size: 1.5em; font-weight: normal; margin: 0 0 25px 0; color: #ddd; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }

        .info-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 30px;
            border-left: 5px solid #00ffcc;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 600px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .status-text { color: #00ffcc; font-size: 1.3em; font-weight: bold; }
        .file-text { color: #ffaa00; font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .progress-text { color: #fff; font-size: 1.1em; }

        /* 右上角 LOGO 樣式 (改為 250px 呼吸縮放，移除圓形裁切與旋轉) */
        .logo-container {
            position: fixed;   
            top: 40px;         
            right: 50px;       
            z-index: 9999;     
        }

        .breathing-logo {
            max-width: 250px;   /* LOGO 的寬度 */
            border-radius: 8px; 
            object-fit: contain;  
            animation: pulse 2s infinite alternate; 
        }

        /* 定義呼吸縮放的動畫關鍵幀 */
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.6)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.8)); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="Server Logo" class="breathing-logo" onerror="this.style.display='none'">
    </div>

    <div class="overlay">
        <h1>Hanahimeのゲーセン</h1>
        <h2>正在前往地圖： <span id="map-name" style="color: #ffaa00;">讀取中...</span></h2>

        <div class="info-box">
            <div id="loading-status" class="status-text">連線中，請稍候...</div>
            <div id="download-file" class="file-text">準備下載資源...</div>
            <div id="progress-text" class="progress-text"></div>
        </div>
    </div>

    <script>
        // === 背景圖片輪播設定 ===
        const backgrounds = [
            'bg2.png', 'bg3.png', 'bg4.png', 'bg5.png'
        ];
        
        backgrounds.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        let currentBgIndex = -1;

        function changeBackground() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * backgrounds.length);
            } while (newIndex === currentBgIndex && backgrounds.length > 1);
            
            currentBgIndex = newIndex;
            document.body.style.backgroundImage = `url('${backgrounds[currentBgIndex]}')`;
        }

        changeBackground();
        setInterval(changeBackground, 5000);


        // --- 以下為 GMod 引擎會自動呼叫的內建 JavaScript 函式 ---

        const urlParams = new URLSearchParams(window.location.search);
        const mapNameParam = urlParams.get('mapname');
        if (mapNameParam) {
            document.getElementById('map-name').innerText = mapNameParam;
        }

        let filesTotal = 0;
        let filesNeeded = 0;

        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            document.getElementById('map-name').innerText = mapname;
        }

        function SetStatusChanged(status) {
            document.getElementById('loading-status').innerText = status;
        }

        function DownloadingFile(fileName) {
            document.getElementById('download-file').innerText = "下載檔案: " + fileName;
        }

        function SetFilesTotal(total) {
            filesTotal = total;
        }

        function SetFilesNeeded(needed) {
            filesNeeded = needed;
            if (filesTotal > 0) {
                let downloaded = filesTotal - filesNeeded;
                let percentage = Math.round((downloaded / filesTotal) * 100);
                document.getElementById('progress-text').innerText = "總進度: " + percentage + "% (" + downloaded + " / " + filesTotal + ")";
            }
        }
    </script>

</body>
</html>
